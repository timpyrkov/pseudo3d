<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self-Intersection Study</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="controls">
      <div class="control-row">
        <label>Seed <span id="val-seed">42</span></label>
        <input type="range" id="slider-seed" min="0" max="100" value="42" step="1" />
      </div>
      <div class="control-row">
        <label>Vertices <span id="val-vertices">30</span></label>
        <input type="range" id="slider-vertices" min="3" max="100" value="30" step="1" />
      </div>
      <div class="control-row">
        <label>Noise <span id="val-noise">0.50</span></label>
        <input type="range" id="slider-noise" min="0" max="3" value="0.5" step="0.01" />
      </div>
      <div class="control-row">
        <label>Zoom <span id="val-zoom">1.00</span>x</label>
        <input type="range" id="slider-zoom" min="0.2" max="3" value="1" step="0.01" />
      </div>
      <div class="control-row">
        <label>Speed <span id="val-speed">1.00</span>x</label>
        <input type="range" id="slider-speed" min="0" max="1" value="0.5" step="0.01" />
      </div>
      <div class="control-row center">
        <button id="btn-playpause">⏸ Pause</button>
      </div>
    </div>
  </div>
  <script src="test_intersect.js"></script>
</body>
</html>
