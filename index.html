<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pseudo-3D Bevel</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="controls">
      <div class="control-row">
        <label>Seed <span id="val-seed">42</span></label>
        <input type="range" id="slider-seed" min="0" max="100" value="42" step="1" />
      </div>
      <div class="control-row">
        <label>Vertices <span id="val-vertices">12</span></label>
        <input type="range" id="slider-vertices" min="3" max="100" value="12" step="1" />
      </div>
      <div class="control-row">
        <label>Noise <span id="val-noise">0.30</span></label>
        <input type="range" id="slider-noise" min="0" max="1" value="0.3" step="0.01" />
      </div>
      <div class="control-row">
        <label>Bevel <span id="val-bevel">20</span></label>
        <input type="range" id="slider-bevel" min="0" max="133" value="20" step="1" />
      </div>
      <div class="control-row">
        <label>Light <span id="val-light">45</span>°</label>
        <input type="range" id="slider-light" min="0" max="360" value="45" step="1" />
      </div>
      <div class="control-row">
        <label>Speed <span id="val-speed">1.00</span>x</label>
        <input type="range" id="slider-speed" min="0" max="1" value="0.5" step="0.01" />
      </div>
      <div class="control-row">
        <label>Wireframe <input type="checkbox" id="chk-wireframe" checked /></label>
      </div>
      <div class="control-row center">
        <button id="btn-playpause">⏸ Pause</button>
      </div>
    </div>
  </div>
  <script src="sketch.js"></script>
</body>
</html>
